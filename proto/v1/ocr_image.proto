syntax = "proto3";

service ImageOCRService {
    rpc UploadImageServer (UploadRequest) returns (ImageOCRResp) ;
}

// Request File
message UploadRequest {
    string url = 1;
    string country = 2;
}

// Response File
message OCRData {
    optional string idNumber = 1;
    optional string nameZh = 2;
    optional string nameEn = 3;
    optional string gender = 4;
    optional string dob = 5;
    optional string nationality = 6;
    optional string validFrom = 7;
    optional string validTo = 8;
    optional string address = 9;
}

message ImageOCRResp {
    string country = 1;
    OCRData fields = 2;
}